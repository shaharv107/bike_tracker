<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bike Tracker Dashboard</title>
    <style>
        :root { --alarm-color: #ff0000; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100%; transition: background 0.5s; }
        
        #overlay {
            position: absolute; top: 15px; left: 15px; z-index: 1000;
            background: white; padding: 15px; border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 1px solid #ddd;
        }

        .alarm-active { animation: pulse-red 1s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0px rgba(255, 0, 0, 0.7); }
            100% { box-shadow: 0 0 0 20px rgba(255, 0, 0, 0); }
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div style="font-size: 0.8em; color: gray;">SYSTEM STATUS</div>
        <div id="status" style="font-weight: bold;">Standby...</div>
        <hr>
        <div id="coords" style="font-family: monospace;">Waiting for data...</div>
    </div>

    <div id="map"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        let map, marker, path;
        let coordsList = [];
        const socket = io();

        async function initMap() {
            const { Map } = await google.maps.importLibrary("maps");
            const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");

            const afekaPos = { lat: 32.1133, lng: 34.8178 };
            map = new Map(document.getElementById("map"), { zoom: 16, center: afekaPos, mapId: "TRACKER_ID" });

            const bikeIcon = document.createElement('img');
            bikeIcon.src = "https://cdn-icons-png.flaticon.com/512/3198/3198336.png";
            bikeIcon.style.width = "40px";

            marker = new AdvancedMarkerElement({ map, position: afekaPos, content: bikeIcon });
            path = new google.maps.Polyline({ strokeColor: "#FF0000", strokeWeight: 4, map });
            
            document.getElementById('status').innerText = "ONLINE";
        }

        // Handle GPS Updates
        socket.on('locationUpdate', (data) => {
            const pos = { lat: data.lat, lng: data.lng };
            coordsList.push(pos);
            path.setPath(coordsList);
            marker.position = pos;
            map.panTo(pos);
            document.getElementById('coords').innerText = `${data.lat.toFixed(5)}, ${data.lng.toFixed(5)}`;
        });

        // Handle Security Breach Events
        socket.on('securityBreach', (data) => {
            document.getElementById('status').innerText = "🚨 ALARM TRIGGERED!";
            document.getElementById('status').style.color = "red";
            document.getElementById('overlay').classList.add('alarm-active');
            alert("SECURITY ALERT: UNMAUTHORIZED MOVEMENT!");
        });
    </script>

    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key=__GOOGLE_MAPS_API_KEY__&callback=initMap&libraries=marker">
    </script>
</body>
</html>
